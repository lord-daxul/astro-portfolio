name: Build Astro site

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          PUBLIC_WORDPRESS_GRAPHQL_URL: ${{ secrets.PUBLIC_WORDPRESS_GRAPHQL_URL }}
          PUBLIC_WORDPRESS_SITE_URL: ${{ secrets.PUBLIC_WORDPRESS_SITE_URL }}
        run: npm run build
